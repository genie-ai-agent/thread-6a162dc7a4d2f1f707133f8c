<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NYC Landmarks</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header class="hero">
    <h1>NYC Landmarks</h1>
    <p class="subtitle">Iconic sights across all five boroughs</p>
  </header>

  <section class="controls">
    <input id="search" type="search" placeholder="Search landmarks..." autocomplete="off" />
    <div id="borough-filters" class="filters"></div>
  </section>

  <main>
    <div id="count" class="count"></div>
    <ul id="grid" class="grid"></ul>
    <p id="empty" class="empty" hidden>No landmarks match.</p>
  </main>

  <footer>
    <p>45 landmarks &middot; all five boroughs</p>
  </footer>

  <script src="data.js"></script>
  <script src="script.js"></script>
</body>
</html>
